[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# הפונקציה הזו רצה אוטומטית כל יום ב-06:00 UTC (כ-08:00/09:00 בישראל, תלוי בשעון קיץ)
# בודקת סירובים בהוראות קבע ומשדרת מחדש לפי הגדרות שהוגדרו באתר
[functions."retry-failed-charges"]
  schedule = "0 6 * * *"

# הפונקציה הזו רצה אוטומטית כל יום ב-07:00 UTC (כ-09:00/10:00 בישראל, תלוי בשעון קיץ)
# בודקת תזכורות תרומה שהגיע תאריכן, ושולחת מייל תזכורת לפנייה חוזרת לתורם
[functions."send-donor-reminders"]
  schedule = "0 7 * * *"
